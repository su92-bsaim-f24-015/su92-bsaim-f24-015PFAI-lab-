<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Random Joke App</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
}

body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #667eea, #764ba2);
}

.container {
    background: rgba(255,255,255,0.2);
    backdrop-filter: blur(10px);
    padding: 40px;
    border-radius: 15px;
    width: 500px;
    text-align: center;
    color: white;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

h1 {
    margin-bottom: 25px;
    font-size: 32px;
}

.joke-box {
    background: white;
    color: #333;
    padding: 25px;
    border-radius: 10px;
    margin-bottom: 25px;
}

.setup {
    font-size: 20px;
    font-weight: bold;
    margin-bottom: 15px;
}

.punchline {
    font-size: 18px;
    color: #555;
}

button {
    padding: 12px 25px;
    border: none;
    border-radius: 8px;
    background: #ff6b6b;
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #ff3b3b;
    transform: scale(1.05);
}

.footer {
    margin-top: 20px;
    font-size: 14px;
    opacity: 0.8;
}
</style>
</head>
<body>

<div class="container">

<h1>😂 Random Joke Generator</h1>

<div class="joke-box">
    <p class="setup">{{ setup }}</p>
    <p class="punchline">{{ punchline }}</p>
</div>

<form method="get" action="/">
    <button type="submit">🤣 Get Another Joke</button>
</form>

<div class="footer">
Made with ❤️ using Flask API
</div>

</div>

</body>
</html>
