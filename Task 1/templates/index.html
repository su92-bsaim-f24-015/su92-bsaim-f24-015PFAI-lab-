<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Email Scraper Tool</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: Arial, Helvetica, sans-serif;
}

body{
background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.container{
background:white;
width:520px;
padding:40px;
border-radius:12px;
box-shadow:0 15px 35px rgba(0,0,0,0.3);
text-align:center;
}

h1{
color:#333;
margin-bottom:10px;
}

.subtitle{
color:#666;
margin-bottom:25px;
font-size:14px;
}

input{
width:100%;
padding:12px;
font-size:16px;
border:1px solid #ccc;
border-radius:6px;
margin-bottom:15px;
}

button{
width:100%;
padding:12px;
background:#2c5364;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#1a2f3b;
}

.results{
margin-top:25px;
text-align:left;
}

.results h2{
margin-bottom:10px;
color:#333;
}

ul{
list-style:none;
}

li{
background:#f2f4f7;
padding:10px;
margin-bottom:8px;
border-radius:6px;
font-size:14px;
border-left:4px solid #2c5364;
}

.no-email{
margin-top:20px;
color:red;
font-weight:bold;
}

</style>

</head>


<body>

<div class="container">

<h1>Email Scraper</h1>

<p class="subtitle">
Extract emails from any website quickly
</p>

<form method="POST">

<input 
type="text" 
name="url" 
placeholder="Enter website URL (https://example.com)" 
value="{{ url }}"
required
>

<button type="submit">
Scrape Emails
</button>

</form>


{% if emails %}

<div class="results">

<h2>Found Emails</h2>

<ul>

{% for email in emails %}

<li>{{ email }}</li>

{% endfor %}

</ul>

</div>

{% elif url %}

<p class="no-email">
No emails found on this website.
</p>

{% endif %}


</div>

</body>
</html>
