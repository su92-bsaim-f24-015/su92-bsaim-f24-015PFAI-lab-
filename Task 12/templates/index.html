<!DOCTYPE html>
<html>

<head>

    <title>University Admission Chatbot</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

    <div class="container">

        <h1>University Admission Chatbot</h1>

        <form method="POST">

            <input type="text"
                   name="question"
                   placeholder="Ask your question..."
                   required>

            <button type="submit">Ask</button>

        </form>

        {% if response %}

            <div class="response">

                <h3>Answer:</h3>

                <p>{{ response }}</p>

            </div>

        {% endif %}

    </div>

</body>

</html>
