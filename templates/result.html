<!DOCTYPE html>
<html>
<head>
    <title>Result</title>

    <!-- SAME CSS FILE -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container result-card">

    <h2>USH AI Job Match Result</h2>

    <div class="box">
        <h3>Best Job Match</h3>
        <p class="job">{{ job }}</p>
    </div>

    <div class="box">
        <h3>Match Score</h3>
        <p class="score">{{ score }}%</p>
    </div>

    <div class="box">
        <h3>Skills Found</h3>
        <ul>
            {% for skill in skills %}
                <li>{{ skill }}</li>
            {% endfor %}
        </ul>
    </div>

    <a href="/" class="btn"> Try Again</a>

</div>

</body>
</html>
